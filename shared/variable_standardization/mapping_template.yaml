# 变量名称标准化映射模板
# Variable Name Standardization Mapping Template
#
# 使用说明:
#   1. 复制此文件并修改为项目特定的映射
#   2. 通过 VariableStandardizer(mapping_file="your_mapping.yaml") 加载
#   3. 每个条目的 key 为原始变量名，value 包含标准化信息
#
# 字段说明:
#   zh        - 中文标准名称
#   en        - 英文标准名称
#   unit      - 单位
#   category  - 变量分类
#   type      - 数据类型 (continuous / categorical / binary / ordinal)
#   description - 变量描述（可选）

# ── 人口学变量 ──────────────────────────────────────────────
age:
  zh: "年龄（岁）"
  en: "Age (years)"
  unit: "岁"
  category: "人口学"
  type: continuous

性别:
  zh: "性别"
  en: "Sex"
  unit: ""
  category: "人口学"
  type: categorical
  description: "Male / Female"

male:
  zh: "男性"
  en: "Male"
  unit: ""
  category: "人口学"
  type: binary

